<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>忆海诊断工具集</title>
<style>
  body { font: 14px/1.6 sans-serif; background: #0f172a; color: #e2e8f0; padding: 32px; max-width: 700px; margin: 0 auto; }
  h1 { color: #38bdf8; font-size: 20px; margin-bottom: 4px; }
  h2 { color: #94a3b8; font-size: 14px; font-weight: normal; margin-bottom: 32px; }
  .card { background: #1e293b; border-radius: 10px; padding: 20px 24px; margin-bottom: 20px; border: 1px solid #334155; }
  .card h3 { margin: 0 0 6px; color: #f8fafc; font-size: 16px; }
  .card p  { margin: 0 0 14px; color: #94a3b8; font-size: 13px; }
  .covers  { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
  .covers span { background: #0f172a; color: #64748b; border: 1px solid #334155; border-radius: 4px; padding: 2px 8px; font-size: 11px; }
  a.bm { display: inline-block; background: #1d4ed8; color: #fff; text-decoration: none; border-radius: 6px; padding: 8px 20px; font-size: 14px; font-weight: bold; }
  a.bm:hover { background: #2563eb; }
  .how { margin-top: 12px; color: #475569; font-size: 12px; }
</style>
</head>
<body>
<h1>🔍 忆海拾光 — 浏览器诊断工具</h1>
<h2>将下方书签拖到浏览器收藏栏，在 App 页面点击即可使用</h2>

<div class="card">
  <h3>🔍 诊断面板</h3>
  <p>全功能浮层面板，右侧抽屉布局。再次点击书签切换显示/隐藏。</p>
  <div class="covers">
    <span>📊 Session & 同步状态</span>
    <span>📋 事件日志（过滤 + 未同步高亮）</span>
    <span>⚠️ 诊断日志（yh_logs warn/error）</span>
    <span>🃏 CardState 分组 + 异常检测</span>
    <span>⚙️ SRS 配置 + 日志等级切换</span>
  </div>
  <a class="bm" id="bm_panel" href="#">🔍 忆海·诊断面板</a>
  <div class="how">拖到收藏栏 → 在 <strong>App 页面</strong>点击注入面板</div>
</div>

<script>
const PANEL_CODE = `(function(){if(window._yhDiag){window._yhDiag.toggle();return;}var s=document.createElement('script');s.src='https://katelynmichelin976-wq.github.io/ReminiSea/tests/yh_diag.js?t='+Date.now();document.head.appendChild(s);})()`;
document.getElementById('bm_panel').href = 'javascript:' + encodeURIComponent(PANEL_CODE);
</script>
</body>
</html>
